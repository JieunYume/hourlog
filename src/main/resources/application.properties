spring.application.name=hourlog

# Server (Railway가 PORT를 주입함)
server.port=${PORT:8080}

# Database
# 로컬: DB_URL / DB_USERNAME / DB_PASSWORD 사용
# Railway: MySQL 플러그인이 MYSQLHOST 등을 자동 주입
spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:hourlog}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:1234}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
