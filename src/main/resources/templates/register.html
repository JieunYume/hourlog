<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HourLog — 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <h1 class="login-title">HourLog</h1>
        <p class="login-subtitle">나 오늘 뭐했지?</p>

        <form th:action="@{/register}" method="post">
            <p class="msg-error" th:if="${error}" th:text="${error}"></p>

            <div class="form-group">
                <input type="text" name="username" placeholder="아이디 (3자 이상)"
                       autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="비밀번호 (6자 이상)"
                       autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <input type="password" name="passwordConfirm" placeholder="비밀번호 확인"
                       autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn-login">가입하기</button>
        </form>

        <p class="auth-link">이미 계정이 있나요? <a th:href="@{/login}">로그인</a></p>
    </div>
</body>
</html>
