<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HourLog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <h1 class="login-title">HourLog</h1>
        <p class="login-subtitle">나 오늘 뭐했지?</p>

        <form th:action="@{/login}" method="post">
            <p class="msg-error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
            <p class="msg-success" th:if="${param.logout}">로그아웃 되었습니다.</p>

            <div class="form-group">
                <input type="text" name="username" placeholder="아이디"
                       autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="비밀번호"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>

        <p class="msg-success" th:if="${param.registered}">회원가입이 완료되었습니다. 로그인해주세요.</p>
        <p class="auth-link">계정이 없나요? <a th:href="@{/register}">회원가입</a></p>
    </div>
</body>
</html>
